image: python:3.12

variables:
  MAKEFILE_PATH: "DEV/code_quality_toolkit/web/Makefile"
  PYTEST_ADDOPTS: "-q -o junit_family=xunit2 --junitxml=reports/junit.xml --cov=. --cov-report=term --cov-report=xml:reports/coverage.xml --cov-report=html:htmlcov"

cache:
  paths:
    - .venv
    - .cache/pip

stages:
  - debug
  - lint
  - typecheck
  - unit
  - coverage
  - analyze

# --- DEBUG: valida que el Makefile esté donde esperas ---
debug_workspace:
  stage: debug
  script:
    - pwd
    - ls -la
    - echo "MAKEFILE_PATH=$MAKEFILE_PATH"
    - test -f "$MAKEFILE_PATH" || (echo "FALTA $MAKEFILE_PATH" && exit 1)
    - find . -maxdepth 2 -type d -print
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# --- LINT (ruff) ---
lint_ruff:
  stage: lint
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update -y
    - apt-get install -y make
    - make -f "$MAKEFILE_PATH" setup
  script:
    - make -f "$MAKEFILE_PATH" lint
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .ruff_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# --- TYPECHECK (mypy) ---
typecheck_mypy:
  stage: typecheck
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update -y
    - apt-get install -y make
    - make -f "$MAKEFILE_PATH" setup
  script:
    - make -f "$MAKEFILE_PATH" typecheck
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .mypy_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# --- UNIT TESTS ---
tests_unit:
  stage: unit
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update -y
    - apt-get install -y make
    - make -f "$MAKEFILE_PATH" setup
    - mkdir -p reports
  script:
    - make -f "$MAKEFILE_PATH" test
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_BRANCH == "main"

# --- COVERAGE (HTML + Cobertura) ---
coverage_report:
  stage: coverage
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update -y
    - apt-get install -y make
    - make -f "$MAKEFILE_PATH" setup
    - mkdir -p reports
  script:
    - make -f "$MAKEFILE_PATH" test
  artifacts:
    when: always
    paths:
      - htmlcov/
      - reports/coverage.xml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- ANALYZE (toolkit → report.json) ---
analyze_toolkit:
  stage: analyze
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update -y
    - apt-get install -y make
    - make -f "$MAKEFILE_PATH" setup
  script:
    - make -f "$MAKEFILE_PATH" report
  artifacts:
    when: always
    paths:
      - report.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
