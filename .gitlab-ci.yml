# .gitlab_ci.yml (version 1)

image: python:latest

before_script:
- python --version
- pip install pytest
- echo "Hello, $GITLAB_USER_LOGIN!"
- echo $REPO_NAME

stages: # List of stages for jobs, and their order of execution
- unit_tests

# **************** UNIT TESTING stage ****************************

tests_integration_calculator:
  stage: unit_tests
  script:
    - echo "Running integration tests for calculator..."
    - cd $CI_PROJECT_DIR/DEV/calculator
    - pytest
