# .gitlab_ci.yml (version 5 -- add security checks)

image: python:3.12


variables:
    BUILD_TYPE: draft # you can change e.g. to release when the time comes

before_script:
    - python --version
    - echo "Hello, $GITLAB_USER_LOGIN!"
    - echo $REPO_NAME
    - echo $CI_COMMIT_BRANCH
    - echo $CI_PROJECT_DIR
    - cd $CI_PROJECT_DIR/DEV/code_quality_toolkit
    - make setup
    - pwd

stages: # List of stages for jobs, and their order of execution
    - unit_tests
    - quality
    - integration
    - security


# **************** UNIT TESTING stage ****************************

unit_tests:
  stage: unit_tests
  script:
    - echo "Running unit tests ... "
    - echo $CI_COMMIT_BRANCH
    - make test

test_coverage:
  stage: unit_tests
  before_script:
    - pip install pytest pytest-cov bandit
  script:
  - echo "Assessing test coverage... "
  - echo $CI_COMMIT_BRANCH
  - export PYTHONPATH="$CI_PROJECT_DIR/DEV/code_quality_toolkit/src:$PYTHONPATH" # report goes to terminal and htmlcov → open 'index.html' in a browser
  - pytest --cov=. --cov-report=html --cov-report=term --cov-fail-under=70 --ignore=$CI_PROJECT_DIR/DEV/calculator
  artifacts:
    paths:
      - DEV/code_quality_toolkit/htmlcov_unit/ # Preserve the html coverage files as an artifact
    #expire_in: 1 day  # (Optional) Specify how long to keep the artifact
    # (e.g., 1 week, 1 day, never)


# # **************** QUALITY stage ****************************

lint_code:
  stage: quality
  script:
    - echo "Checking coding style... "
    - echo $CI_COMMIT_BRANCH
    - make lint
  allow_failure: false #default is false;

code_complexity:
  stage: quality
  before_script:
    - pip install xenon
  script:
    - echo "Checking code complexity... "
    - echo $CI_COMMIT_BRANCH
    - xenon -b C -m C -a C --ignore='venv' .
            # -b A : At least one block has a complexity rank higher than A (i.e. B, C, D, E or F)
            # -m A : At least one module has a complexity rank higher than A (i.e. B, C, D, E or F)
            # -a A : Average complexity has rank higher than A (i.e. B , C, D, E or F)
  allow_failure: false #default is false;


# # **************** INTEGRATION stage ****************************

integration_tests:
  stage: integration
  script:
    - echo "Running integration tests ... "
    - echo $CI_COMMIT_BRANCH
    - make setup
    - .venv/bin/python -m pytest tests/integration

integration_tests_coverage:
  stage: integration
  before_script:
    - pip install pytest pytest-cov bandit
  script:
  - echo "Assessing integration test coverage... "
  - echo $CI_COMMIT_BRANCH
  - export PYTHONPATH="$CI_PROJECT_DIR/DEV/code_quality_toolkit/src:$PYTHONPATH" # report goes to terminal and htmlcov → open 'index.html' in a browser
  - pytest --cov=. --cov-report=term --cov-report=html tests/integration --cov-fail-under=30 --ignore=$CI_PROJECT_DIR/DEV/calculator
  #artifacts:
  #  paths:
  #    - DEV/code_quality_toolkit/htmlcov_integration/ # Preserve the html coverage files as an artifact
    #expire_in: 1 day  # (Optional) Specify how long to keep the artifact
    # (e.g., 1 week, 1 day, never).


# # **************** SECURITY stage ****************************

security:
  stage: security
  before_script:
    - pip install bandit
  script:
    - echo "Running security tests at application level... "
    - echo $CI_COMMIT_BRANCH
    - bandit -r $CI_PROJECT_DIR/DEV/code_quality_toolkit/src
  allow_failure: false # set to false - security should NEVER be compromised