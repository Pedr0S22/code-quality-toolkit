image: python:3.12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV: ".venv"
  BIN: ".venv/bin"
  MAKEFILE_PATH: "DEV/code_quality_toolkit/web/Makefile"
  PYTEST_ADDOPTS: "-q -o junit_family=xunit2 --junitxml=reports/junit.xml --cov=. --cov-report=term --cov-report=xml:reports/coverage.xml --cov-report=html:htmlcov"

cache:
  paths:
    - .cache/pip
    - .venv

stages:
  - debug
  - lint
  - typecheck
  - unit
  - coverage
  - analyze

# ---------- plantilla de setup (válida para GitLab) ----------
.setup_job:
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - >
      if [ -f "$MAKEFILE_PATH" ]; then
        echo ">>> Using Makefile at $MAKEFILE_PATH" &&
        make -f "$MAKEFILE_PATH" setup;
      else
        echo ">>> Fallback setup (Makefile not found)" &&
        python -m venv .venv &&
        .venv/bin/pip install --upgrade pip &&
        if [ -f requirements-dev.txt ]; then .venv/bin/pip install -r requirements-dev.txt;
        elif [ -f requirements.txt ]; then .venv/bin/pip install -r requirements.txt;
        else .venv/bin/pip install ruff black mypy pytest pytest-cov; fi;
      fi
    - echo "PWD: $(pwd)" && ls -la

# ---------- debug opcional ----------
debug_workspace:
  stage: debug
  script:
    - pwd
    - ls -la
    - echo "Buscar Makefile..." && test -f "$MAKEFILE_PATH" && echo "OK: $MAKEFILE_PATH existe" || (echo "FALTA: $MAKEFILE_PATH" && exit 1)
    - echo "Estructura:" && find . -maxdepth 2 -type d -print
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ---------- LINT ----------
lint_ruff:
  stage: lint
  extends: .setup_job
  script:
    - make -f "$MAKEFILE_PATH" lint || .venv/bin/ruff check src tests
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .ruff_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ---------- TYPECHECK ----------
typecheck_mypy:
  stage: typecheck
  extends: .setup_job
  script:
    - make -f "$MAKEFILE_PATH" typecheck || .venv/bin/mypy src/toolkit
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .mypy_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ---------- UNIT TESTS ----------
tests_unit:
  stage: unit
  extends: .setup_job
  script:
    - make -f "$MAKEFILE_PATH" test || .venv/bin/pytest
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- COVERAGE ----------
coverage_report:
  stage: coverage
  extends: .setup_job
  script:
    - make -f "$MAKEFILE_PATH" test || .venv/bin/pytest
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml
    paths:
      - htmlcov/
      - reports/coverage.xml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- ANALYZE (toolkit) ----------
analyze_toolkit:
  stage: analyze
  extends: .setup_job
  script:
    - make -f "$MAKEFILE_PATH" report || .venv/bin/python -m toolkit.core.cli analyze examples/sample_project --out report.json
  artifacts:
    when: always
    paths:
      - report.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
