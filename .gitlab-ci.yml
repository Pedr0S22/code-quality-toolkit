# .gitlab-ci.yml — Makefile + venv (.venv) + ruff/mypy/pytest

image: python:3.12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV: ".venv"
  BIN: ".venv/bin"
  PYTEST_ADDOPTS: "-q -o junit_family=xunit2 --junitxml=reports/junit.xml --cov=. --cov-report=term --cov-report=xml:reports/coverage.xml --cov-report=html:htmlcov"

cache:
  paths:
    - .cache/pip
    - .venv

stages:
  - lint
  - typecheck
  - unit
  - coverage
  - analyze

# ---------- LINT ----------
lint_ruff:
  stage: lint
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - make setup
    - |
      if [ ! -x "$BIN/ruff" ] || [ ! -x "$BIN/black" ] || [ ! -x "$BIN/mypy" ] || [ ! -x "$BIN/pytest" ]; then
        $BIN/pip install ruff black mypy pytest pytest-cov
      fi
  script:
    - make lint          # ruff check src tests
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .ruff_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ---------- TYPECHECK ----------
typecheck_mypy:
  stage: typecheck
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - make setup
    - |
      if [ ! -x "$BIN/mypy" ]; then
        $BIN/pip install mypy
      fi
  script:
    - make typecheck     # mypy src/toolkit
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .mypy_cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ---------- UNIT TESTS ----------
tests_unit:
  stage: unit
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - make setup
    - |
      if [ ! -x "$BIN/pytest" ]; then
        $BIN/pip install pytest pytest-cov
      fi
  script:
    - make test          # pytest (usa PYTEST_ADDOPTS)
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- COVERAGE ----------
coverage_report:
  stage: coverage
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - make setup
    - |
      if [ ! -x "$BIN/pytest" ]; then
        $BIN/pip install pytest pytest-cov
      fi
  script:
    - make test          # genera coverage.xml y htmlcov/ por PYTEST_ADDOPTS
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml
    paths:
      - htmlcov/
      - reports/coverage.xml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- ANALYZE (toolkit) ----------
analyze_toolkit:
  stage: analyze
  before_script:
    - python --version
    - pip install --upgrade pip
    - apt-get update && apt-get install -y make > /dev/null
    - make setup
  script:
    - make report        # python -m toolkit.core.cli analyze ... --out report.json
  artifacts:
    when: always
    paths:
      - report.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
