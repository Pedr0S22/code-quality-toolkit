
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dependency Graph Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #1e1e1e;
        color: #333;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        gap: 20px;
        max-width: 100%;
        height: 90vh;
    }

    .dashboard-title {
        font-size: 24px;
        font-weight: 600;
        color: #007ACC;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
    }

    /* METRICS (Top Row) */
    .metrics-container {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
        height: 280px; 
    }
    .card {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border: 1px solid #e1e4e8;
    }

    .metric-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .metric-value {
        font-size: 48px;
        font-weight: bold;
        color: #2c3e50;
    }
    .metric-label {
        font-size: 14px;
        color: #7f8c8d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 5px;
        font-weight: 600;
    }

    /* Severity Badges */
    .sev-badge-group {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
        padding: 0 20px;
    }
    .sev-badge {
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        display: flex;
        justify-content: space-between;
    }
    .bg-high { background-color: #dc3545; }
    .bg-medium { background-color: #ffc107; color: #333; }
    .bg-low { background-color: #0d6efd; }

    /* Chart Container */
    .chart-container {
        flex: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    /* TABLE LAYOUT */
    .main-content {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .table-wrapper {
        flex: 1;
        overflow: auto;
        border: 1px solid #eee;
        border-radius: 4px;
        position: relative;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
        min-width: 1000px;
    }

    thead {
        position: sticky;
        top: 0;
        z-index: 20;
    }

    th {
        background: #fafafa;
        text-align: left;
        padding: 12px;
        border-bottom: 2px solid #ddd;
        color: #555;
        user-select: none;
        position: relative;
        box-shadow: 0 1px 0 #ddd;
    }

    th:hover { background-color: #eee; }

    td {
        padding: 10px 12px;
        border-bottom: 1px solid #f0f0f0;
        color: #333;
        vertical-align: top;
    }

    td.no-wrap {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    td.msg-col {
        white-space: normal;
        word-break: break-word;
        cursor: text;
        user-select: text;
    }

    tr:hover { background-color: #f8f9fa; }

    .sort-icon {
        font-size: 10px;
        margin-left: 5px;
        color: #bbb;
        cursor: pointer;
    }
    th.active .sort-icon { color: #333; }

    .resizer {
        position: absolute;
        top: 0;
        right: 0;
        width: 5px;
        cursor: col-resize;
        user-select: none;
        height: 100%;
        background: transparent;
        z-index: 30;
    }
    .resizer:hover, .resizing { background: #0d6efd; }
</style>
</head>
<body>

<div class="dashboard-grid">
    <div class="dashboard-title">Dependency Graph Dashboard</div>

    <div class="metrics-container">
        
        <div class="card metric-card" style="flex: 0.8;">
            <div class="metric-value" id="total-issues">0</div>
            <div class="metric-label">Total Issues</div>
        </div>

        <div class="card metric-card" style="flex: 1;">
            <h4 style="margin: 0 0 15px 0; color: #555; font-size: 14px;">Breakdown</h4>
            <div class="sev-badge-group">
                <div class="sev-badge bg-high">
                    <span>HIGH</span> <span id="count-high">0</span>
                </div>
                <div class="sev-badge bg-medium">
                    <span>MED</span> <span id="count-medium">0</span>
                </div>
                <div class="sev-badge bg-low">
                    <span>LOW</span> <span id="count-low">0</span>
                </div>
            </div>
        </div>

        <div class="card chart-container">
            <h4 style="margin: 0 0 5px 0; color: #555
            ; font-size: 14px;">Severity Distribution</h4>
            <div id="chart-area" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <div class="main-content card" style="padding: 0;">
        <div class="table-wrapper">
            <table id="issues-table">
                <thead>
                    <tr>
                        <th style="width: 90px;" onclick="handleSort('severity')">
                            Severity <span class="sort-icon">↕</span>
                            <div class="resizer"></div>
                        </th>
                        <th style="width: 250px;" onclick="handleSort('file')">
                            File <span class="sort-icon">↕</span>
                            <div class="resizer"></div>
                        </th>
                        <th style="width: 100px;" onclick="handleSort('code')">
                            Code <span class="sort-icon">↕</span>
                            <div class="resizer"></div>
                        </th>
                        <th style="width: 70px;" onclick="handleSort('line')">
                            Line <span class="sort-icon">↕</span>
                            <div class="resizer"></div>
                        </th>
                        <th style="width: auto;" onclick="handleSort('message')">
                            Message <span class="sort-icon">↕</span>
                            <div class="resizer"></div>
                        </th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let issues = [];
    let currentSort = { column: 'severity', direction: 'desc' };
    const severityWeight = {
        "fatal": 4, "high": 3, "medium": 2,
        "low": 1, "convention": 1, "refactor": 1
    };

    try {
        const rawData = {"results": [{"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 3, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "os", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: sys (stdlib)", "line": 4, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "sys", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: json (stdlib)", "line": 5, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "json", "category": "stdlib"}, {"severity": "info", "code": "DEP-FROM_IMPORT", "message": "Import: datetime datetime (stdlib)", "line": 6, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "datetime", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: math (stdlib)", "line": 9, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "math", "category": "stdlib"}, {"severity": "info", "code": "DEP-FROM_IMPORT", "message": "Import: random randint (stdlib)", "line": 14, "col": 1, "hint": "", "file": "examples\\sample_project\\import.py", "module": "random", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 1, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\L2_Medium\\med_1_import.py", "module": "os", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: non_existent_pkg (local)", "line": 1, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\L3_High\\high_3_importerr.py", "module": "non_existent_pkg", "category": "local"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 4, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\all_1.py", "module": "os", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: non_existent_pkg (local)", "line": 6, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\all_3.py", "module": "non_existent_pkg", "category": "local"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: sys (stdlib)", "line": 1, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\kitchen_sink_nightmare.py", "module": "sys", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 1, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\kitchen_sink_nightmare.py", "module": "os", "category": "stdlib"}, {"severity": "medium", "code": "DEP-FROM_IMPORT", "message": "Import: datetime * (stdlib) [WILDCARD]", "line": 2, "col": 1, "hint": "Evite wildcard imports (*).", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\kitchen_sink_nightmare.py", "module": "datetime", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: non_existent_module (local)", "line": 3, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\kitchen_sink_nightmare.py", "module": "non_existent_module", "category": "local"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 4, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_L1_L2\\mix_12_a.py", "module": "os", "category": "stdlib"}, {"severity": "info", "code": "DEP-IMPORT", "message": "Import: os (stdlib)", "line": 1, "col": 1, "hint": "", "file": "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_L2_L3\\mix_23_a.py", "module": "os", "category": "stdlib"}], "metrics": {"total_issues": 16, "total_files": 8, "unique_files": ["examples\\sample_project\\import.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\L2_Medium\\med_1_import.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\L3_High\\high_3_importerr.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\all_1.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\all_3.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_All\\kitchen_sink_nightmare.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_L1_L2\\mix_12_a.py", "examples\\sample_project\\plugins\\linter_wrapper\\pylint\\Mix_L2_L3\\mix_23_a.py"], "severity_counts": {"info": 15, "medium": 1}}} || {};
        
        if (Array.isArray(rawData)) { issues = rawData; } 
        else { issues = rawData.results || []; }

        const metrics = rawData.metrics || {};
        
        document.getElementById('total-issues').textContent =
            metrics.total_issues || issues.length;
        
        const sevCounts = metrics.severity_counts || {};
        ['high', 'medium', 'low'].forEach(k => {
             document.getElementById(`count-${k}`).textContent = sevCounts[k] || 0;
        });

        if (typeof d3 !== 'undefined') {
            const chartData = ["high", "medium", "low"].map(k => ({
                label: k.toUpperCase(),
                key: k,
                value: sevCounts[k] || 0
            }));
            const container = document.getElementById("chart-area");
            const width = container.clientWidth || 400;
            const height = container.clientHeight || 200;
            const margin = {top: 20, right: 30, bottom: 30, left: 40};

            container.innerHTML = '';
            const svg = d3.select("#chart-area").append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("viewBox", `0 0 ${width} ${height}`)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const colors = {
                "high": "#dc3545", "medium": "#ffc107", "low": "#0d6efd"
            };

            const x = d3.scaleBand()
                .range([0, width - margin.left - margin.right])
                .domain(chartData.map(d => d.label))
                .padding(0.4);

            const yMax = d3.max(chartData, d => d.value) || 10;
            const y = d3.scaleLinear()
                .domain([0, yMax])
                .range([height - margin.top - margin.bottom, 0]);

            svg.append("g")
                .attr("transform",
                `translate(0, ${height - margin.top - margin.bottom})`)
                .call(d3.axisBottom(x).tickSize(0))
                .selectAll("text").style("font-size", "11px")
                .style("font-weight", "bold");

            svg.append("g").call(d3.axisLeft(y).ticks(5));

            svg.selectAll("bars").data(chartData).join("rect")
                .attr("x", d => x(d.label))
                .attr("y", d => y(d.value))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - margin.top - margin.bottom) - y(d.value))
                .attr("fill", d => colors[d.key]);
        }

        // Resizer & Sorting Logic (Same as before)
        document.querySelectorAll('.resizer').forEach(resizer => {
            let x = 0; let w = 0; let th = null;
            const mouseDownHandler = function(e) {
                e.stopPropagation(); th = resizer.parentElement;
                x = e.clientX; w = th.offsetWidth;
                resizer.classList.add('resizing');
                document.addEventListener('mousemove', mouseMoveHandler);
                document.addEventListener('mouseup', mouseUpHandler);
            };
            const mouseMoveHandler = function(e) {
                const dx = e.clientX - x; th.style.width = `${w + dx}px`;
            };
            const mouseUpHandler = function() {
                resizer.classList.remove('resizing');
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            };
            resizer.addEventListener('mousedown', mouseDownHandler);
        });

        window.handleSort = function(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' 
                ? 'desc' : 'asc';
            } else {
                currentSort.column = column; currentSort.direction = 'asc';
            }
            issues.sort((a, b) => {
                let valA = a[column], valB = b[column];
                if (column === 'severity') {
                    valA = severityWeight[(valA || '').toLowerCase()] || 0;
                    valB = severityWeight[(valB || '').toLowerCase()] || 0;
                } else if (column === 'line') {
                    valA = parseInt(valA) || 0; valB = parseInt(valB) || 0;
                } else {
                    valA = (valA || '').toString().toLowerCase();
                    valB = (valB || '').toString().toLowerCase();
                }
                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });
            updateSortIcons(); renderTable();
        };

        function updateSortIcons() {
            document.querySelectorAll('.sort-icon')
            .forEach(icon => icon.textContent = '↕');
            const activeHeader = document.querySelector(
            `th[onclick="handleSort('${currentSort.column}')"]`);
            if (activeHeader) {
                activeHeader.querySelector('.sort-icon').textContent =
                    currentSort.direction === 'asc' ? '▲' : '▼';
            }
        }

        function renderTable() {
            const tbody = document.querySelector("#issues-table tbody");
            tbody.innerHTML = '';
            if (!issues.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;                  padding:20px;">No issues found.</td></tr>';
                return;
            }
            issues.forEach(issue => {
                const tr = document.createElement("tr");
                const sev = (issue.severity || 'low').toLowerCase();
                const sevClass = sev === 'fatal' ? 'high' : sev;
                const sevColor = sevClass === 'high' ?
                  '#dc3545' : sevClass === 'medium' ? '#ffc107' : '#0d6efd';

                tr.innerHTML = `
                    <td class="no-wrap" style="font-weight:bold; color: ${sevColor}">
                        ${sev.toUpperCase()}
                    </td>
                    <td class="no-wrap" title="${issue.file || 'unknown'}">
                        ${issue.file || 'unknown'}
                    </td>
                    <td class="no-wrap"><span class="top-issue-code">${issue.code || ''}
                    </span></td>
                    <td class="no-wrap">${issue.line || ''}</td>
                    <td class="msg-col">${issue.message || ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        handleSort('severity');

    } catch (e) {
        console.error(e);
        document.body.innerHTML = `<h3 style="color:red">
        Error rendering dashboard: ${e.message}</h3>`;
    }
</script>
</body>
</html>
