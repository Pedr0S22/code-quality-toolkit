<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <title>Duplicate Code Checker Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        .chart-container { width: 1066px; height: 628px; border: 1px solid #ddd; }
        .issue { font-size: 13px; }
    </style>
</head>
<body>

<div id="app" class="chart-container"></div>

<script>
    // Results injected by render_html
    const results = {{ results | tojson }};

    const issues = results.results || [];

    const svg = d3.select("#app")
        .append("svg")
        .attr("width", 1066)
        .attr("height", 628);

    // ---- Severity counts ----
    const severityCounts = d3.rollups(
        issues,
        v => v.length,
        d => d.severity
    ).map(([severity, count]) => ({ severity, count }));

    const x = d3.scaleBand()
        .domain(severityCounts.map(d => d.severity))
        .range([50, 500])
        .padding(0.2);

    const y = d3.scaleLinear()
        .domain([0, d3.max(severityCounts, d => d.count) || 0])
        .range([580, 100]);

    svg.selectAll("rect.bar")
        .data(severityCounts)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.severity))
        .attr("y", d => y(d.count))
        .attr("width", x.bandwidth())
        .attr("height", d => 580 - y(d.count));

    svg.selectAll("text.bar-label")
        .data(severityCounts)
        .enter()
        .append("text")
        .attr("x", d => x(d.severity) + x.bandwidth() / 2)
        .attr("y", d => y(d.count) - 5)
        .attr("text-anchor", "middle")
        .text(d => d.count);

    // ---- Issue list ----
    svg.selectAll("text.issue")
        .data(issues)
        .enter()
        .append("text")
        .attr("class", "issue")
        .attr("x", 550)
        .attr("y", (d, i) => 120 + i * 18)
        .text(d => `${d.file}:${d.line} – ${d.message}`);
</script>

</body>
</html>
