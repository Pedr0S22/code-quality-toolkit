[plugins]
enabled = ["StyleChecker","CyclomaticComplexity", "SecurityChecker", "DuplicationChecker","CommentDensity", "DeadCodeDetector", "LinterWrapper"]

[plugins.dead_code]
ignore_patterns = ["^__", "^test_"]
min_name_length = 2
severity = "low"

[plugins.linter_wrapper]
enabled = true
linters = ["pylint"]
timeout_seconds = 60
max_issues = 500
pylint_args = [
  "--disable=C0114,C0115,C0116",
]
fail_on_severity = "high"

[rules]
max_line_length = 88
max_complexity = 10
max_function_length = 50
max_arguments = 5
check_whitespace = true 
indent_style = "spaces" 
indent_size = 4
allow_mixed_indentation = false
check_naming = true

min_comment_density = 0.1  
max_comment_density = 0.5  

[analyze]
include = ["**/*.py"]
exclude = ["venv/**", "tests/**"]
