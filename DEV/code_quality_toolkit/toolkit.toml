[plugins]
enabled = ["StyleChecker","CyclomaticComplexity", "SecurityChecker", "DuplicationChecker","CommentDensity", "DeadCodeDetector"]

[plugins.dead_code]
ignore_patterns = ["^__", "^test_"]
min_name_length = 2
severity = "low"

[plugins.cyclomatic_complexity]
max_complexity = 10

[rules]
max_line_length = 88
max_function_length = 50
max_arguments = 5
check_whitespace = true 
indent_style = "spaces" 
indent_size = 4
allow_mixed_indentation = false
check_naming = true

security_report_level="LOW"

min_density = 0.1  
max_density = 0.5  

[analyze]
include = ["**/*.py"]
exclude = ["venv/**", "tests/**"]
