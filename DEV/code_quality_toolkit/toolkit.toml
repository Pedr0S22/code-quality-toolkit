[plugins]
enabled = ["StyleChecker","CyclomaticComplexity", "SecurityChecker", "DuplicationChecker","CommentDensity", "DeadCodeDetector","DependencyGraph", "LinterWrapper"]

[plugins.dead_code]
ignore_patterns = ["^__", "^test_"]
min_name_length = 2
severity = "low"

[plugins.linter_wrapper]
enabled = true
linters = ["pylint"]
timeout_seconds = 60
max_issues = 500
pylint_args = [
  "--disable=C0114,C0115,C0116",
]
fail_on_severity = "high"

[plugins.style_checker]
max_line_length = 88
check_whitespace = true
indent_style = "spaces"
indent_size = 4
allow_mixed_indentation = false
check_naming = true

[rules]
max_line_length = 88
max_complexity = 10
max_function_length = 50
max_arguments = 5
check_whitespace = true
indent_style = "spaces"
indent_size = 4
allow_mixed_indentation = false
check_naming = true
metrics_report_level = "MEDIUM"

security_report_level="LOW"

min_density = 0.1  
max_density = 0.5  

warn_wildcard_imports = true
max_relative_import_level = 1
track_stdlib_modules = true

[analyze]
include = ["**/*.py"]
exclude = ["venv/**", "tests/**"]
