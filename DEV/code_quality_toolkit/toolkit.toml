[plugins]
enabled = ["StyleChecker", "CyclomaticComplexity"]

[rules]
max_line_length = 88
max_complexity = 10
max_function_length = 50
max_arguments = 5
check_whitespace = true 
indent_style = "spaces" 
indent_size = 4
allow_mixed_indentation = false
check_naming = true

[analyze]
include = ["**/*.py"]
exclude = ["venv/**", "tests/**"]
