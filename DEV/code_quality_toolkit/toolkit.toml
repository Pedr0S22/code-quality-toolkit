[plugins]
enabled = ["StyleChecker","CyclomaticComplexity", "SecurityChecker", "DuplicationChecker","CommentDensity", "DeadCodeDetector","DependencyGraph"]

[plugins.dead_code]
ignore_patterns = ["^__", "^test_"]
min_name_length = 2
severity = "low"

[rules]
max_line_length = 88
max_complexity = 10
max_function_length = 50
max_arguments = 5
check_whitespace = true
indent_style = "spaces"
indent_size = 4
allow_mixed_indentation = false
check_naming = true
metrics_report_level = "MEDIUM"

security_report_level="LOW"

min_density = 0.1  
max_density = 0.5  

warn_wildcard_imports = true
max_relative_import_level = 1
track_stdlib_modules = true

[analyze]
include = ["**/*.py"]
exclude = ["venv/**", "tests/**"]
